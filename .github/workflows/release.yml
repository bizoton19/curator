name: Release Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: project-context/apps/desktop
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project-context/apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build DOCX renderer bundle
        run: dotnet publish ../../services/docx-renderer -c Release -o ../../services/docx-renderer/publish

      - name: Create tag if missing
        id: tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "released=true" >> "$GITHUB_OUTPUT"

      - name: Build & publish
        if: steps.tag.outputs.released == 'true'
        run: npm run build && npx electron-builder --config electron-builder.config.cjs --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
